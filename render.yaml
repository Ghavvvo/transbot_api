services:
  - type: web
    name: transbot-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app
    envVars:
      - key: MISTRAL_API_KEY
        sync: false  # Configurar manualmente en Render Dashboard
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0

    # Ya no necesitas disco persistente - los embeddings están en Git!
    plan: free  # Funciona perfecto en plan gratuito

